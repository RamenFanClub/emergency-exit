name: Check and Deploy

on:
  push:
    branches: [main]

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check index.html files are in sync
        run: |
          if ! diff -q index.html frontend/index.html > /dev/null 2>&1; then
            echo "❌ index.html and frontend/index.html are out of sync!"
            echo "Fix: copy one to the other before pushing."
            exit 1
          fi
          echo "✅ Both index.html files are in sync."